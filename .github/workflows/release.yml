# fauxchange — the tag-triggered release pipeline (#55). Version-agnostic:
# it tags every artifact FROM Cargo.toml's [package].version, whatever that
# is at cut time — it does not assume or require 1.0.0 (the #55 pass that
# introduced this file built the machinery but deliberately held the 1.0.0
# promotion; see RELEASE-READINESS.md).
#
# Publishes the three artifacts RELEASE-PROCESS.md §5-§6 documents: the
# crate to crates.io, the container image to ghcr.io (both runtime
# targets — `runtime-slim`, the compose-pinned default, and
# `runtime-distroless`), and the GitHub Release with notes lifted straight
# from the matching CHANGELOG.md section. Triggered ONLY by an annotated
# `vX.Y.Z` tag push — never by a branch push, so this workflow never runs
# on a PR or a feature branch (`ci.yml` / `bench-regression.yml` already
# cover every push/PR; this file is deliberately narrow).
#
# RELEASE-PROCESS.md §5 "push order matters": the branch is pushed first
# (so the tagged commit is reachable on `main` and has already gone
# through the FULL push-triggered gate set as an ordinary branch push),
# *then* the tag. `verify` does NOT trust that ordering blindly — it
# PROVES it: the tagged commit must be an ancestor of `origin/main`, AND
# every required gate (conformance, fuzz, performance, stability, audit,
# migration — every check-run those workflows post) must have concluded
# `success` on THIS EXACT commit SHA, or the release fails before anything
# is published. A tag pointing at an unmerged branch, or at a commit whose
# CI is red/absent, therefore cannot publish an artifact.
#
# `verify` gates ALL publish jobs. The irreversible promotions are then
# SERIALIZED (RELEASE-PROCESS.md §9): `publish-crate` first, then
# `publish-image` (`needs` it), then `github-release`. crates.io is the
# first irreversible step; if `publish-image` fails after the crate is
# live, the crate version is already public and IMMUTABLE — recovery is a
# PATCH re-tag (a new `vX.Y.(Z+1)`), never a mutate/yank of the published
# version (see RELEASE-PROCESS.md §9 "partial-release recovery").
#
# Secrets: `CARGO_REGISTRY_TOKEN` (crates.io, repo secret — provisioned by
# the operator before the first tag push, see RELEASE-READINESS.md
# "REMAINING FOR THE HUMAN") and the ambient `GITHUB_TOKEN` (ghcr.io push under
# `packages: write`, `gh release create` under `contents: write`, and the
# read-only check-run query in `verify`) — the minimum permission set,
# scoped per job. Neither secret is ever echoed to a log; `cargo publish` /
# `docker login` read them from the step `env`, never a shell interpolation
# that could land in `set -x` output.
#
# Third-party actions are PINNED to a reviewed commit SHA (docs/08 §7 supply
# chain) with a trailing `# vX.Y.Z` comment — a mutable major tag on a
# publish-capable workflow is a supply-chain hole.
name: release

on:
  push:
    tags:
      - "v*"

# A release is never superseded mid-publish by a later push to the SAME
# tag (tags are immutable, RELEASE-PROCESS.md §9) — never cancel an
# in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Compile-time `sqlx::query!` macros build OFFLINE from the committed
  # `.sqlx/` data, same as every job in ci.yml — no DB is contacted here.
  SQLX_OFFLINE: "true"
  # Matches rust-toolchain.toml / ci.yml — bump both together, deliberately.
  RUST_TOOLCHAIN: "1.97.0"
  IMAGE: ghcr.io/joaquinbejar/fauxchange

jobs:
  # --- Prove the tag is on main AND its full gate set is green on THIS SHA, --
  # --- then re-run the binding Pre-Submission Checklist + supply-chain/ ------
  # --- migration gates on the tagged commit --------------------------------
  verify:
    name: verify
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      checks: read
    env:
      RUSTFLAGS: "-D warnings"
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so the main-ancestry proof below can resolve the
          # merge-base — a shallow clone cannot answer `--is-ancestor`.
          fetch-depth: 0
      - name: Tagged commit is reachable from origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "::error::tag $GITHUB_REF_NAME ($GITHUB_SHA) is NOT an ancestor of origin/main — refusing to publish an unmerged commit" >&2
            exit 1
          fi
          echo "tagged commit $GITHUB_SHA is on main"
      - name: Every required gate is green on THIS exact tagged commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # The tag must point at a commit that ALREADY passed the full gate
          # set (conformance, fuzz, performance, stability, audit, migration —
          # every check the push-to-main workflows post) as an ordinary push.
          # We REQUIRE their success on THIS SHA rather than re-running the
          # heavy suites (nightly fuzz, Docker soak) or trusting a same-branch
          # run reached it. Any non-success — or a suspiciously empty check
          # set (a commit CI never actually saw) — fails the release.
          runs="$(gh api "repos/${{ github.repository }}/commits/${GITHUB_SHA}/check-runs?per_page=100" --paginate)"
          total="$(echo "$runs" | jq '[.check_runs[]] | length')"
          # A completed check that did not succeed (ignore the release run's own
          # in-progress checks: only terminal, non-success conclusions block).
          bad="$(echo "$runs" | jq -r '[.check_runs[] | select(.status=="completed") | select(.conclusion!="success" and .conclusion!="neutral" and .conclusion!="skipped") | "\(.name)=\(.conclusion)"] | unique | join(", ")')"
          if [ -n "$bad" ]; then
            echo "::error::required gates are not green on $GITHUB_SHA: $bad" >&2
            exit 1
          fi
          # A real CI-covered commit has many checks; near-zero means the tag
          # points at a commit main's gate workflows never actually ran on.
          if [ "$total" -lt 5 ]; then
            echo "::error::only $total check-runs on $GITHUB_SHA — the tagged commit did not go through the CI gate set" >&2
            exit 1
          fi
          echo "all $total check-runs on $GITHUB_SHA are green"
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-verify
      - name: Tag matches Cargo.toml [package].version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "version=$cargo_version" >> "$GITHUB_OUTPUT"
      # The four binding checks (rules/global_rules.md "Pre-Submission
      # Checklist") — unchanged from ci.yml's fmt/clippy/test/build-release
      # jobs, re-run here (cheap) so a release NEVER depends on trusting a
      # separate workflow run reached the same commit. `cargo test
      # --all-features` covers the conformance / determinism / parity
      # suites in `tests/`; the specialized fuzz / bench / soak gates are
      # required-green above rather than re-run.
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo build --release
      # Supply-chain + migration gates (docs/08 §8), re-proven on the tagged
      # commit rather than only required-green above.
      - name: cargo-audit (RustSec advisory scan)
        run: |
          cargo install cargo-audit --locked --version ^0.21 || cargo install cargo-audit --locked
          cargo audit
      - name: cargo-deny (license / ban / source policy)
        run: |
          cargo install cargo-deny --locked --version ^0.16 || cargo install cargo-deny --locked
          cargo deny check
      - name: Migrations compile-check (sqlx offline data is current)
        run: |
          # `.sqlx/` is the committed offline query data every `sqlx::query!`
          # builds from; a stale set means a migration/query drift. A clean
          # `--offline` build (above) already exercised it; re-assert the
          # migrations directory is present and non-empty for the image build.
          test -d migrations && [ -n "$(ls -A migrations)" ] || { echo "::error::migrations/ missing or empty" >&2; exit 1; }
      - name: "cargo package --list — the exact file set that would be published"
        run: cargo package --list
      # `--dry-run` REBUILDS the repackaged tarball in an isolated directory and
      # compiles it — `--list` alone only enumerates filenames and does NOT
      # catch a source file missing from `[package].include` that the build
      # needs (this exact gap — `migrations/` and `.sqlx/`, both required at
      # COMPILE time by `sqlx::migrate!`/`sqlx::query!` — broke this repo's
      # first-ever `cargo publish --dry-run` run during the #55 release-prep
      # pass; `--list` alone would NOT have caught it). No
      # `CARGO_REGISTRY_TOKEN` is needed for a dry run — it never uploads.
      - run: cargo publish --dry-run

  # --- crates.io — the FIRST irreversible promotion, serialized before the ---
  # --- image push so a partial release has a defined recovery (patch re-tag) --
  publish-crate:
    name: publish-crate
    needs: [verify]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-publish-crate
      - name: cargo publish (CARGO_REGISTRY_TOKEN read from env only, never echoed)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  # --- ghcr.io: both runtime targets, tagged from Cargo.toml's version ---
  # --- (docs/06-deployment.md §12, SEMVER.md "single crate, coordinated ---
  # --- image"). SERIALIZED AFTER publish-crate: the image build + secret ---
  # --- scan (reversible, local) run first, and the irreversible `docker ---
  # --- push` only after the crate is already live, so the two irreversible ---
  # --- promotions never race. If a push here fails, the crate is public and ---
  # --- immutable — recover with a patch re-tag, never a yank. ---------------
  publish-image:
    name: publish-image
    needs: [verify, publish-crate]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Build runtime-slim (the DEFAULT target — reversible, no push yet)
        run: |
          docker build -f docker/Dockerfile --target runtime-slim \
            -t "$IMAGE:${{ needs.verify.outputs.version }}" \
            -t "$IMAGE:latest" .
      - name: No baked secrets — the #26 image-scan gate, re-run against the artifact about to be pushed (docs/08 §7)
        run: docker/scan-image-secrets.sh "$IMAGE:${{ needs.verify.outputs.version }}"
      - name: Build runtime-distroless (minimal variant, own tag suffix — never `latest`; reversible, no push yet)
        run: |
          docker build -f docker/Dockerfile --target runtime-distroless \
            -t "$IMAGE:${{ needs.verify.outputs.version }}-distroless" .
      - name: No baked secrets — runtime-distroless (docs/08 §7)
        run: docker/scan-image-secrets.sh "$IMAGE:${{ needs.verify.outputs.version }}-distroless"
      # Both images are built + scanned above; only now do the irreversible
      # pushes run, back to back, after the crate is already live.
      - name: Log in to ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - run: |
          docker push "$IMAGE:${{ needs.verify.outputs.version }}"
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ needs.verify.outputs.version }}-distroless"

  # --- GitHub Release, notes lifted verbatim from CHANGELOG.md -----------
  github-release:
    name: github-release
    needs: [verify, publish-crate, publish-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Extract this version's CHANGELOG.md section as the release notes
        run: |
          awk "/^## \[${{ needs.verify.outputs.version }}\]/,/^## \[/" CHANGELOG.md \
            | head -n -1 > release-notes.md
      - name: gh release create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.verify.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ needs.verify.outputs.version }}" \
            --notes-file release-notes.md
