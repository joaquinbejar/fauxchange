# fauxchange — the tag-triggered release pipeline (#55). Version-agnostic:
# it tags every artifact FROM Cargo.toml's [package].version, whatever that
# is at cut time — it does not assume or require 1.0.0 (the #55 pass that
# introduced this file built the machinery but deliberately held the 1.0.0
# promotion; see RELEASE-READINESS.md).
#
# Publishes the three artifacts RELEASE-PROCESS.md §5-§6 documents: the
# crate to crates.io, the container image to ghcr.io (both runtime
# targets — `runtime-slim`, the compose-pinned default, and
# `runtime-distroless`), and the GitHub Release with notes lifted straight
# from the matching CHANGELOG.md section. Triggered ONLY by an annotated
# `vX.Y.Z` tag push — never by a branch push, so this workflow never runs
# on a PR or a feature branch (`ci.yml` / `bench-regression.yml` already
# cover every push/PR; this file is deliberately narrow).
#
# RELEASE-PROCESS.md §5 "push order matters": the branch is pushed first
# (so the tagged commit is reachable on `main` and has already gone
# through `ci.yml`'s full push-triggered gate as an ordinary branch push),
# *then* the tag — this workflow assumes that ordering and re-verifies the
# Pre-Submission Checklist itself in `verify` before either publish step
# runs, rather than trusting the earlier `ci.yml` run blindly (a tag can,
# in principle, point at a commit `ci.yml` never saw).
#
# `verify` gates BOTH publish jobs — a broken build, a clippy warning, or a
# tag/Cargo.toml version mismatch fails BEFORE `cargo publish` or `docker
# push` run (both are effectively irreversible per RELEASE-PROCESS.md §9).
# `publish-crate` and `publish-image` run in parallel (independent
# artifacts); `github-release` waits on both so the Release notes only ever
# point at artifacts that are actually live.
#
# Secrets: `CARGO_REGISTRY_TOKEN` (crates.io, repo secret — provisioned by
# the operator before the first tag push, see RELEASE-READINESS.md
# "REMAINING FOR THE HUMAN") and the ambient `GITHUB_TOKEN` (ghcr.io push under
# `packages: write`, and `gh release create` under `contents: write`) — the
# minimum permission set, scoped to this workflow only (`ci.yml` /
# `bench-regression.yml` stay `contents: read`). Neither secret is ever
# echoed to a log; `cargo publish` / `docker login` read them from the step
# `env`, never a shell interpolation that could land in `set -x` output.
name: release

on:
  push:
    tags:
      - "v*"

# A release is never superseded mid-publish by a later push to the SAME
# tag (tags are immutable, RELEASE-PROCESS.md §9) — never cancel an
# in-flight release.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Compile-time `sqlx::query!` macros build OFFLINE from the committed
  # `.sqlx/` data, same as every job in ci.yml — no DB is contacted here.
  SQLX_OFFLINE: "true"
  # Matches rust-toolchain.toml / ci.yml — bump both together, deliberately.
  RUST_TOOLCHAIN: "1.97.0"
  IMAGE: ghcr.io/joaquinbejar/fauxchange

jobs:
  # --- Re-run the binding Pre-Submission Checklist on the tagged commit, ---
  # --- plus the release-specific tag/version consistency check -------------
  verify:
    name: verify
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: "-D warnings"
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-verify
      - name: Tag matches Cargo.toml [package].version
        id: version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(awk -F'"' '/^version = /{print $2; exit}' Cargo.toml)"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "tag $GITHUB_REF_NAME does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          echo "version=$cargo_version" >> "$GITHUB_OUTPUT"
      # The four binding checks (rules/global_rules.md "Pre-Submission
      # Checklist") — unchanged from ci.yml's fmt/clippy/test/build-release
      # jobs, run again here so a release NEVER depends on trusting a
      # separate workflow run reached the same commit.
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo test --all-features
      - run: cargo build --release
      - name: "cargo package --list — the exact file set that would be published"
        run: cargo package --list
      # `--dry-run` REBUILDS the repackaged tarball in an isolated directory and
      # compiles it — `--list` alone only enumerates filenames and does NOT
      # catch a source file missing from `[package].include` that the build
      # needs (this exact gap — `migrations/` and `.sqlx/`, both required at
      # COMPILE time by `sqlx::migrate!`/`sqlx::query!` — broke this repo's
      # first-ever `cargo publish --dry-run` run during the #55 release-prep
      # pass; `--list` alone would NOT have caught it). No
      # `CARGO_REGISTRY_TOKEN` is needed for a dry run — it never uploads.
      - run: cargo publish --dry-run

  # --- crates.io ---------------------------------------------------------
  publish-crate:
    name: publish-crate
    needs: [verify]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: release-publish-crate
      - name: cargo publish (CARGO_REGISTRY_TOKEN read from env only, never echoed)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

  # --- ghcr.io: both runtime targets, tagged from Cargo.toml's version ---
  # --- (docs/06-deployment.md §12, SEMVER.md "single crate, coordinated ---
  # --- image") -------------------------------------------------------------
  publish-image:
    name: publish-image
    needs: [verify]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - name: Log in to ghcr.io
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: "Build + push runtime-slim (the DEFAULT target — docker-compose.yml pins target: runtime-slim)"
        run: |
          docker build -f docker/Dockerfile --target runtime-slim \
            -t "$IMAGE:${{ needs.verify.outputs.version }}" \
            -t "$IMAGE:latest" .
      - name: No baked secrets — the #26 image-scan gate, re-run against the artifact about to be pushed (docs/08 §7)
        run: docker/scan-image-secrets.sh "$IMAGE:${{ needs.verify.outputs.version }}"
      - run: |
          docker push "$IMAGE:${{ needs.verify.outputs.version }}"
          docker push "$IMAGE:latest"
      - name: Build + push runtime-distroless (minimal variant, own tag suffix — never `latest`)
        run: |
          docker build -f docker/Dockerfile --target runtime-distroless \
            -t "$IMAGE:${{ needs.verify.outputs.version }}-distroless" .
      - name: No baked secrets — runtime-distroless (docs/08 §7)
        run: docker/scan-image-secrets.sh "$IMAGE:${{ needs.verify.outputs.version }}-distroless"
      - run: docker push "$IMAGE:${{ needs.verify.outputs.version }}-distroless"

  # --- GitHub Release, notes lifted verbatim from CHANGELOG.md -----------
  github-release:
    name: github-release
    needs: [verify, publish-crate, publish-image]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - name: Extract this version's CHANGELOG.md section as the release notes
        run: |
          awk "/^## \[${{ needs.verify.outputs.version }}\]/,/^## \[/" CHANGELOG.md \
            | head -n -1 > release-notes.md
      - name: gh release create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.verify.outputs.version }}" \
            --repo "${{ github.repository }}" \
            --title "v${{ needs.verify.outputs.version }}" \
            --notes-file release-notes.md
