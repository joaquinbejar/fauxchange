# fauxchange CI pipeline
#
# Wires the CI-matrix jobs from docs/TESTING.md §11 plus the v0.1
# supply-chain gate from docs/08-threat-model.md §8: fmt / clippy / test /
# build-release / doctests / msrv / golden / determinism / parity /
# cargo-audit / cargo-deny. All are non-negotiable per
# rules/global_rules.md "Pre-Submission Checklist" and
# docs/TESTING.md §12 — a green run here means all of them passed, nothing
# is skipped to turn the pipeline green.
#
# The `migrations` job (added in v0.2 #023) runs the optional PostgreSQL
# persistence layer's migrations + DB integration test against an ephemeral
# `postgres:18-alpine` via testcontainers. The non-DB jobs build OFFLINE from the
# committed `.sqlx/` (top-level `SQLX_OFFLINE: "true"`), so the compile-time
# `sqlx::query!` macros never need a DB — a query changed without a regenerated
# `.sqlx/` fails the offline build.
#
# The `image-build` job (added in v0.2 #025; hardened in v0.2 #026) proves
# `docker/Dockerfile` BUILDS on every push/PR and validates
# `docker/docker-compose.yml` with `docker compose config`. It does NOT push
# anywhere — publishing a tagged image to a registry is a release-pipeline
# concern (docs/06-deployment.md §10, RELEASE-PROCESS.md) and a risky action
# requiring explicit confirmation, out of scope here.
#
# #026 additions to `image-build`: it now builds BOTH runtime targets
# (`runtime-slim` — the default, curl `HEALTHCHECK` — and the minimal
# `runtime-distroless`, no shell / package manager), asserts both start as
# the unprivileged uid 65532, asserts distroless truly has no shell, runs
# `docker/scan-image-secrets.sh` against both built images (the no-baked-
# secrets gate, docs/08 §7), and boots `runtime-slim` under
# `--read-only --cap-drop=ALL --security-opt no-new-privileges:true` to prove
# the recommended hardened run posture (docs/08 §9, docker-compose.yml) still
# serves `/health`. It also now `needs: [cargo-audit, cargo-deny]` — the
# supply-chain gate now blocks the image build itself, not just the crate
# (docs/08 §8): a new advisory or a policy violation fails BEFORE any image
# is built.
#
# The `fuzz` job (added in v0.4 #042, docs/08-threat-model.md §6) runs a SHORT
# bounded `cargo-fuzz` pass over the FIX tag-value decode path
# (`fuzz/fuzz_targets/fix_decode.rs`), seeded by the committed adversarial
# corpus (`fuzz/corpus/fix_decode/`) — the same two-stage pipeline the acceptor
# drives on every inbound TCP read. `fuzz/` is a DELIBERATELY separate Cargo
# workspace (its own `Cargo.lock`, no `[workspace]` table links it to the root
# crate — verified via `cargo metadata`); this job is the only place its
# toolchain/dependencies touch CI, and it never affects the `RUST_TOOLCHAIN` /
# `RUST_MSRV` pin or the `cargo-audit`/`cargo-deny` gates above (both resolve
# the root manifest only). A crash or ASan finding fails the job; the corpus is
# never regenerated in CI (`UPDATE_CORPUS` is a local-only maintenance action,
# see `tests/fix_adversarial.rs`).
#
# Explicitly OUT of this workflow (see
# milestones/v0.1-backend-core/019-ci-audit-deny-lint.md "Scope"):
# the `bench-regression` gate (armed before v1.0). The `docker-smoke`
# cold-bring-up + one-order-round-trip e2e stage (v0.2 #027) is wired below,
# dedicated and DOCKER=1-gated — not on every unit-test job.
#
# `make workflow-<job-id>` (see Makefile) runs any job here locally via
# `act` — job ids below are the stable contract those targets rely on.

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "main"
      - "release/**"

# Cancel a superseded run on the same ref — this workflow has no deploy job,
# so the whole pipeline is safe to cancel-in-progress.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Build the compile-time `sqlx::query!` macros from the committed `.sqlx/`
  # offline data (#023) — NO database is contacted at build time by any job. The
  # `migrations` job below still runs the queries against a REAL ephemeral
  # `postgres:18-alpine` at test RUNTIME (SQLX_OFFLINE only governs compile-time
  # macro resolution, never runtime connections).
  SQLX_OFFLINE: "true"
  # The pinned stable toolchain (matches rust-toolchain.toml). Bump both
  # together, deliberately.
  RUST_TOOLCHAIN: "1.97.0"
  # The verified MSRV floor — `expiration_date` (transitive via
  # optionstratlib) requires rustc 1.96; `cargo +1.95.0 check --all-features`
  # fails, `cargo +1.96.0 check --all-features` passes (verified on the
  # branch that introduced this workflow). See rust-toolchain.toml.
  RUST_MSRV: "1.96.0"
  # cargo-audit / cargo-deny versions verified locally against this
  # dependency tree (see .cargo/audit.toml and deny.toml). Bump deliberately
  # and re-verify `cargo audit` / `cargo deny check` locally before bumping.
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_DENY_VERSION: "0.19.2"
  # `cargo-fuzz` version verified locally (`cargo +nightly fuzz build/run
  # fix_decode`, #042). Bump deliberately, re-verifying the local build first.
  CARGO_FUZZ_VERSION: "0.13.2"
  # The nightly toolchain `cargo-fuzz` needs (libFuzzer sanitizer-coverage
  # instrumentation is nightly-only) — used ONLY by the `fuzz` job below, never
  # `rust-toolchain.toml` or RUST_TOOLCHAIN/RUST_MSRV above. Bump deliberately,
  # re-verifying `cargo +nightly fuzz run fix_decode` locally first.
  FUZZ_NIGHTLY: "nightly-2026-07-15"
  # Quiet logs on test runs, mirroring `make test` (Makefile).
  LOGLEVEL: WARN

jobs:
  fmt:
    name: fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rustfmt
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: fmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: test
      - run: cargo test --all-features

  build-release:
    name: build-release
    runs-on: ubuntu-24.04
    env:
      RUSTFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: build-release
      - run: cargo build --release

  doctests:
    name: doctests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: doctests
      - run: cargo test --doc --all-features

  msrv:
    name: msrv
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_MSRV }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: msrv
      # rustup toolchain-selection precedence is: `+toolchain` override >
      # `RUSTUP_TOOLCHAIN` env > `rust-toolchain(.toml)` file > `rustup
      # default`. `dtolnay/rust-toolchain` only sets the rustup DEFAULT
      # (lowest precedence) — the repo-root rust-toolchain.toml (pinning
      # RUST_TOOLCHAIN, currently 1.97.0) OUTRANKS that default, so a bare
      # `cargo check` here would silently compile under 1.97.0, never the
      # MSRV floor this job exists to verify. The explicit `+toolchain`
      # override below has the HIGHEST precedence and forces the actual
      # RUST_MSRV floor regardless of rust-toolchain.toml.
      - run: cargo +${{ env.RUST_MSRV }} check --all-features

  golden:
    name: golden
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: golden
      - run: cargo test --test golden --all-features

  determinism:
    name: determinism
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: determinism
      - run: cargo test --test determinism --all-features

  parity:
    name: parity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: parity
      - run: cargo test --test parity --all-features

  # --- FIX parser fuzz target (v0.4 security gate, #042, docs/08 §6) --------
  # A SHORT bounded `cargo-fuzz` run over the FIX tag-value decode path, seeded
  # by the committed adversarial corpus (see the top-of-file note above for the
  # separate-workspace / toolchain-isolation rationale). Builds the target
  # first (a build failure is a distinct, earlier signal from a runtime
  # finding), then runs it for a fixed wall-clock budget over
  # `fuzz/corpus/fix_decode/` — not a soak. `-max_len` matches the harness's
  # own frame cap (`MAX_FRAME_BYTES` in `fuzz/fuzz_targets/fix_decode.rs`) so
  # the budget is spent on realistically-sized frames.
  fuzz:
    name: fuzz
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.FUZZ_NIGHTLY }}
          components: rust-src
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: fuzz -> target
          shared-key: fuzz
      # `cargo-fuzz` itself is a normal stable-Rust CLI (it shells out to
      # `cargo +nightly` for the instrumented build); `cargo install --locked`
      # is its own documented install path and does not depend on a third-party
      # tool registry shipping a prebuilt binary for it. `Swatinem/rust-cache`
      # above caches `~/.cargo/registry`, so repeat runs reuse cargo-fuzz's own
      # already-resolved dependency downloads.
      - run: cargo install cargo-fuzz --locked --version ${{ env.CARGO_FUZZ_VERSION }}
      - run: cargo +${{ env.FUZZ_NIGHTLY }} fuzz build fix_decode
      - run: |
          cargo +${{ env.FUZZ_NIGHTLY }} fuzz run fix_decode fuzz/corpus/fix_decode \
            -- -max_total_time=120 -max_len=262144

  # --- Optional PostgreSQL persistence (docs/06 §6, #023) -------------------
  # Runs the durable persistence layer's migrations + DB integration test
  # against a REAL ephemeral `postgres:18-alpine`, provisioned by
  # `testcontainers` (the `#[ignore]`-gated `tests/db.rs` test uses the runner's
  # host Docker, always present on ubuntu-24.04). The test opens the pool, runs
  # `sqlx::migrate!("./migrations")`, writes + reads back executions, and asserts
  # the durable backend serves records IDENTICAL to the in-memory backend behind
  # the SAME #008 store contract. The crate compiles OFFLINE from the committed
  # `.sqlx/` (top-level `SQLX_OFFLINE`); only the test RUNTIME touches Postgres.
  migrations:
    name: migrations
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: migrations
      # `--ignored` runs ONLY the Docker-gated DB test; the DB-less test in the
      # same file already ran in the `test` job. Migrations apply cleanly against
      # `postgres:18-alpine` inside the test (via `connect_and_migrate`).
      - run: cargo test --test db --all-features -- --ignored
      # The durable venue-journal integration tests (#029) are `#[ignore]`d for
      # the same reason — they spin their OWN ephemeral `postgres:18-alpine`
      # via `testcontainers`, apply the journal migration, and exercise the
      # durable append / recovery-by-re-execution / sequence-continuity paths.
      # The DB-less clock/cadence tests in the same file already ran in `test`.
      - run: cargo test --test integration --all-features -- --ignored

  # --- Supply-chain gate (docs/08-threat-model.md §8) -----------------------
  # Both jobs install the REAL cargo-audit / cargo-deny binaries (pinned
  # versions, checksummed by taiki-e/install-action) and run the exact same
  # commands a developer runs locally via `make audit` / `make deny`, so CI
  # and local never diverge in behavior. Configuration lives in
  # `.cargo/audit.toml` and `deny.toml` (auto-discovered by each tool) — NOT
  # duplicated here as step arguments.

  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2.83.2
        with:
          tool: cargo-audit@${{ env.CARGO_AUDIT_VERSION }}
      # Advisory DB changes daily; cache it but always re-fetch once a day so
      # a NEW advisory is never missed.
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/advisory-db
          key: advisory-db-${{ github.run_id }}
          restore-keys: |
            advisory-db-
      # `cargo audit` picks up `.cargo/audit.toml` automatically (verified
      # locally): the one ignored advisory (RUSTSEC-2024-0436, `paste`
      # unmaintained — not a vulnerability) is documented there with a
      # reason. A real vulnerability advisory is never added to that ignore
      # list and fails this job.
      - run: cargo audit

  cargo-deny:
    name: cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2.83.2
        with:
          tool: cargo-deny@${{ env.CARGO_DENY_VERSION }}
      # `cargo deny check` picks up `deny.toml` automatically: the license
      # allow-list, the RUSTSEC-2024-0436 advisory ignore (same reason as
      # cargo-audit above), the bans (duplicate-version visibility, no
      # wildcard versions) and sources (crates.io only) policy.
      - run: cargo deny check

  # --- Image build + container hardening (docs/06-deployment.md §2/§3, #025; ---
  # --- hardened in #026, docs/08-threat-model.md §7-9) ------------------------
  # Proves `docker/Dockerfile` builds BOTH runtime targets: the default
  # `runtime-slim` (the pinned `rust:1.97.0-bookworm` builder, offline `sqlx`
  # via the committed `.sqlx/`, into the `debian:bookworm-slim` runtime) and
  # the minimal `runtime-distroless` (`gcr.io/distroless/cc-debian12`, pinned
  # by digest, no shell / package manager); that `docker/docker-compose.yml`
  # is valid, both profiles; and the #026 hardening posture — non-root,
  # no-baked-secrets, and read-only-rootfs + dropped-capabilities still
  # serving `/health`. `needs: [cargo-audit, cargo-deny]` gates the image
  # build on the supply-chain scan (docs/08 §8): a new advisory or a policy
  # violation fails BEFORE either image is built. This job does NOT push an
  # image anywhere and does NOT run the compose-up / one-order-round-trip e2e
  # (that is the dedicated `docker-smoke` stage, v0.2 #027). The runner's
  # preinstalled Docker Engine + Compose plugin (ubuntu-24.04) are used
  # directly — no extra action to pin for a plain `docker build`; `jq` and
  # `python3` (used by `docker/scan-image-secrets.sh`) are preinstalled too.
  image-build:
    name: image-build
    runs-on: ubuntu-24.04
    needs: [cargo-audit, cargo-deny]
    steps:
      - uses: actions/checkout@v7
      - name: Build runtime-slim (the DEFAULT target; proves it builds; SQLX_OFFLINE from the committed .sqlx/)
        run: docker build -f docker/Dockerfile --target runtime-slim -t fauxchange:ci .
      - name: Build runtime-distroless (#26 — no shell / package manager in the runtime layer)
        run: docker build -f docker/Dockerfile --target runtime-distroless -t fauxchange:ci-distroless .
      - name: Validate docker-compose.yml (DB-less default profile)
        run: docker compose -f docker/docker-compose.yml config
      - name: Validate docker-compose.yml (persistent profile)
        run: |
          DATABASE_URL="postgres://fauxchange:fauxchange@postgres:5432/fauxchange" \
            docker compose -f docker/docker-compose.yml --profile persistent config
      - name: Loopback metrics — :9090 binds 127.0.0.1 by default (#26, docs/06 §5)
        # No metrics server exists yet (RESERVED port, docker/Dockerfile), so
        # this asserts the compose PORT BINDING itself — the honest,
        # currently-verifiable half of "metrics on loopback": the resolved
        # `docker compose config` output must publish target 9090 with
        # `host_ip: 127.0.0.1` and nothing else, so a future metrics server
        # inherits a loopback-only bind by construction, not by convention.
        run: |
          docker compose -f docker/docker-compose.yml config --format json \
            | jq -e '[.services.fauxchange.ports[] | select(.target == 9090) | .host_ip == "127.0.0.1"] | length == 1 and all'
      - name: Non-root — runtime-slim starts as the unprivileged uid 65532 (#26)
        run: |
          actual="$(docker run --rm --entrypoint id fauxchange:ci)"
          echo "runtime-slim id: $actual"
          case "$actual" in
            uid=65532*) ;;
            *) echo "runtime-slim did not run as uid 65532" >&2; exit 1 ;;
          esac
      - name: Non-root — runtime-distroless defaults to the unprivileged uid 65532 (#26)
        run: |
          user="$(docker inspect fauxchange:ci-distroless --format '{{.Config.User}}')"
          echo "runtime-distroless Config.User: $user"
          [ "$user" = "65532:65532" ] || { echo "runtime-distroless Config.User is not 65532:65532 (got: $user)" >&2; exit 1; }
      - name: Distroless has no shell / package manager (#26)
        run: |
          if docker run --rm --entrypoint sh fauxchange:ci-distroless -c 'echo should-not-run'; then
            echo "runtime-distroless unexpectedly has a working shell" >&2
            exit 1
          fi
          echo "confirmed: exec sh fails in runtime-distroless (no shell present)"
      - name: No baked secrets — image-scan gate on both runtime targets (#26, docs/08 §7)
        run: |
          docker/scan-image-secrets.sh fauxchange:ci
          docker/scan-image-secrets.sh fauxchange:ci-distroless
      - name: Read-only rootfs + dropped capabilities still serve /health (#26, docs/08 §9)
        run: |
          docker run -d --rm --name fx-hardening-check \
            --read-only --cap-drop=ALL --security-opt no-new-privileges:true \
            -p 18080:8080 -e FAUXCHANGE_DEV=1 -e AUTH_BOOTSTRAP_SECRET=ci-hardening-check \
            fauxchange:ci --config /app/seeds/default.toml
          status="000"
          for _ in $(seq 1 30); do
            status="$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:18080/health || true)"
            [ "$status" = "200" ] && break
            sleep 1
          done
          docker logs fx-hardening-check
          docker stop fx-hardening-check
          [ "$status" = "200" ] || { echo "venue did not serve /health under --read-only --cap-drop=ALL --security-opt no-new-privileges:true" >&2; exit 1; }

  # --- Docker e2e smoke: cold-bring-up budget + one-order round-trip (v0.2, ---
  # --- #027, docs/TESTING.md §9) ----------------------------------------------
  # The dedicated stage docs/TESTING.md §9/§11 requires: NOT on every
  # unit-test job — only `DOCKER=1` activates `tests/docker_smoke.rs`; the
  # plain `test` job above never sets it, so the default suite stays green on
  # a machine with no Docker. `needs: [image-build]` — only run the full e2e
  # flow once the Dockerfile itself is known to build and pass the #26
  # hardening checks, so a broken image fails fast in `image-build` rather
  # than burning the extra minutes this stage's own `docker compose build`
  # would otherwise spend re-discovering the same break.
  #
  # The test itself (not this workflow) is what enforces the < 30 s cold NFR-3
  # budget (docs/07-performance-budgets.md §7, docs/PRD.md §4) — it times
  # `docker compose up -d` → the first successful `GET /health` (the REST
  # listener binds only AFTER the bounded seeding phase completes and the
  # venue flips to serving, `src/main.rs`, so a live `/health` IS the
  # serving-and-seeded signal), mints a bootstrap token for the seeded
  # `market-taker` account, places one market order over REST that crosses the
  # seeded market-maker's resting quote, observes the resulting fill over the
  # `fills` WS channel, and asserts no panic in the container logs plus a
  # clean `docker compose down`. The test owns its own Drop-guard teardown; the
  # explicit `down -v` step below is a belt-and-braces safety net in case the
  # test process is killed before its Drop runs (e.g. a CI job timeout).
  docker-smoke:
    name: docker-smoke
    runs-on: ubuntu-24.04
    needs: [image-build]
    env:
      DOCKER: "1"
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - uses: Swatinem/rust-cache@v2.9.1
        with:
          shared-key: docker-smoke
      - name: Build the compose image once (untimed — the smoke test's cold budget covers container-start + self-seed only, never compilation)
        run: docker compose -f docker/docker-compose.yml build
      - run: cargo test --test docker_smoke --all-features -- --nocapture
      - name: Compose logs (always, for CI triage)
        if: always()
        run: docker compose -f docker/docker-compose.yml logs || true
      - name: Ensure the compose stack is torn down (belt-and-braces alongside the test's own Drop guard)
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v --remove-orphans || true
