# Pins the toolchain used for `cargo build`/`test`/`clippy`/`fmt` on this
# repo, for both local development (rustup auto-installs it on first use)
# and CI (`.github/workflows/ci.yml` reads the same version for the
# fmt/clippy/test/build-release/doctests/golden/determinism/parity jobs).
#
# `fauxchange` is Rust edition 2024, which requires 1.85+; the actual floor is
# higher because `expiration_date` (a transitive dep of `optionstratlib`)
# requires rustc 1.96 — verified with `cargo +1.96.0 check --all-features`
# (passes) vs `cargo +1.95.0 check --all-features` (fails: "requires rustc
# 1.96"). The `msrv` CI job pins that floor explicitly
# (`toolchain: "1.96.0"`); this file pins the current stable used for the
# primary gate, one minor ahead of the floor. Bump deliberately — a bump here
# is a dependency-surface decision, not a drive-by edit.
[toolchain]
channel = "1.97.0"
components = ["rustfmt", "clippy"]
