[package]
name = "fauxchange"
version = "0.0.1"
edition = "2024"
authors = ["Joaquin Bejar <jb@taunais.com>"]
description = "Exchange-in-a-box: a local options exchange simulator with realistic matching, FIX/WebSocket/REST APIs and historical replay, for testing trading systems."
license = "MIT"
readme = "README.md"
repository = "https://github.com/joaquinbejar/fauxchange"
homepage = "https://github.com/joaquinbejar/fauxchange"
keywords = ["finance", "exchange", "simulator", "trading", "testing"]
categories = ["finance", "simulation", "development-tools::testing"]
include = ["src/**/*", "Cargo.toml", "README.md", "LICENSE"]

[dependencies]
# Upstream matching stack. `option-chain-orderbook` re-exports the boundary
# newtypes (`OrderId`, `Side`, `Price`, `Quantity`, `TimeInForce`, `TimestampMs`,
# `Hash32`, `InstrumentStatus`) and owns the `SymbolParser` grammar. The
# `sequencer` feature is enabled from #006 (the single-writer order path): it
# activates the upstream `dep:tokio` (`rt` + `sync`) and `orderbook-rs/journal`,
# which pulls `crc32fast` 1.5 and `memmap2` 0.9 into the tree (the upstream
# on-disk journal machinery). #006 does not use that machinery — it builds the
# venue's own write-ahead envelope journal — but the feature makes the upstream
# sequencer / `MassCancelScope` / `MassCancelType` types reachable for the
# matching wiring in #007, and the audit note is recorded now.
option-chain-orderbook = { version = "0.7", features = ["sequencer"] }
# The async runtime for the per-underlying single-writer actor (#006): the
# bounded `mpsc` mailbox, the `oneshot` receipts, and the spawned actor task.
# `fauxchange` is async-first on `tokio` by design (CLAUDE.md; `rules` mandates
# `tokio::sync` primitives). Lean feature set — `rt` (the current-thread runtime
# + `spawn`), `sync` (`mpsc` / `oneshot`), and `macros` (`#[tokio::test]`); the
# `sequencer` feature above already activates tokio `rt` + `sync`, so this adds
# only the `macros` proc-macro to the tree. MIT, maintained by the tokio project.
# The async runtime. #006 needed only `rt` + `sync` + `macros` (the actor
# mailbox); #013 runs the live REST server and the periodic rate-limit
# `sweep_expired` task, so the feature set grows to what serving needs:
#   - `rt-multi-thread` — the binary's multi-thread runtime (`main.rs`).
#   - `net`             — `TcpListener` for `axum::serve`.
#   - `time`            — `tokio::time::interval` driving the bounded
#     `RateLimiter::sweep_expired` reclaim task (#011 seam obligation).
# Still no new crate — these are feature flags on the already-present tokio 1.
tokio = { version = "1", default-features = false, features = [
    "rt",
    "rt-multi-thread",
    "sync",
    "macros",
    "net",
    "time",
] }
# Needed directly only to name `OptionStyle` / `ExpirationDate`: upstream
# `option-chain-orderbook` v0.7.0 does not re-export them, so they must come
# from `optionstratlib` at the seam. `default-features = false` keeps the build
# lean (no plotly / async), matching how the upstream crate depends on it.
optionstratlib = { version = "0.17", default-features = false }
# Concurrent map for the in-memory executions / positions stores (#008): the
# `rules/global_rules.md` Concurrency section blesses `DashMap` over
# `Arc<RwLock<HashMap<>>>` for sharded, lock-free point access. Version `6`
# (`6.2.1`) is already resolved transitively via the upstream matching stack
# (`option-chain-orderbook` / `orderbook-rs` / `pricelevel`), so this direct
# dependency adds NO new version to the tree. MIT/Apache-2.0, maintained by the
# `xacrimon/dashmap` project.
dashmap = "6"
# REST/WS boundary + the live Axum server (#013/#014). `#003` needed only `json`
# (render `VenueError` / `Json` bodies); #013 turns the router into a running
# server and #014 adds the WebSocket surface, so the feature set grows to what
# the server actually uses:
#   - `json`   — `Json<T>` request/response bodies (unchanged from #003).
#   - `query`  — the `Query<T>` extractor for the list/OHLC query DTOs and the
#     WS handshake token (`?token=` / `?access_token=`, #014).
#   - `http1`  — the HTTP/1 protocol `axum::serve` speaks (no HTTP/2 dep pulled).
#   - `tokio`  — `axum::serve`, `TcpListener` wiring, and
#     `into_make_service_with_connect_info::<SocketAddr>()` so the REAL socket
#     peer reaches the rate-limit key (the `PeerAddr` seam, #011/#013).
#   - `ws`     — the `WebSocketUpgrade` / `WebSocket` / `Message` surface for
#     `GET /ws` (#014). Audit note: the `ws` feature pulls the WebSocket protocol
#     codec axum wraps NEW into the tree — `tokio-tungstenite` + `tungstenite` +
#     `data-encoding` + `futures-sink` — all pure-Rust, permissively licensed
#     (MIT/Apache-2.0), maintained crates; `cargo audit` / `cargo deny` (#019)
#     gate them. `sha1` + `base64` (the RFC-6455 handshake accept-key) were
#     ALREADY resolved in the tree, so the `ws` feature adds only a new dependency
#     EDGE to them, not new crate versions. No CLIENT WebSocket crate is added —
#     the conformance tests drive the handshake over a bound server with a raw TCP
#     client (`std::net::TcpStream`), so no `tokio-tungstenite` client
#     dev-dependency is introduced.
# `Path`, `State`, and `middleware::from_fn*` need no feature flag. No new
# top-level crate is declared — these are feature flags on the already-present
# axum 0.8. MIT, maintained by the tokio project.
axum = { version = "0.8", default-features = false, features = [
    "json",
    "query",
    "http1",
    "tokio",
    "ws",
] }
# Swagger UI served at boot (#013). `utoipa-swagger-ui` 9.x is the version that
# targets **axum 0.8** + **utoipa 5** (verified against the crate manifest:
# `[dependencies.axum] version = "0.8.0"`, `[dependencies.utoipa] version =
# "5.0.0"`), matching the pinned `utoipa = "5"`. Feature set is deliberately
# minimal and OFFLINE-SAFE:
#   - `axum`     — the axum 0.8 `SwaggerUi` router integration.
#   - `vendored` — serve the Swagger UI assets from the cached
#     `utoipa-swagger-ui-vendored` crate, so the build NEVER downloads assets
#     over the network (the default build.rs path pulls `reqwest`; the `reqwest`
#     feature is left OFF, so that build-dependency is not compiled).
# `default-features = false` drops the `url` default (unused here). Audit note:
# this adds `rust-embed` 8, `zip` 3 (build-dep, unpacks the vendored asset zip),
# `mime` 0.3, and `utoipa-swagger-ui-vendored` 0.1 to the tree — all pure-Rust,
# permissively licensed, and already resolved in the local cache; `cargo audit`
# / `cargo deny` (#019) gate them. MIT/Apache-2.0, maintained by the utoipa
# project.
utoipa-swagger-ui = { version = "9", default-features = false, features = [
    "axum",
    "vendored",
] }
serde = { version = "1", features = ["derive"] }
# TOML parse for the layered venue config file (#022). `default-features = false,
# features = ["parse", "serde"]` keeps exactly the deserialize path we need
# (`toml::from_str` into the `#[serde(deny_unknown_fields)]` section structs) and
# drops `display` (no serializer — the venue only READS its config). Audit note:
# this adds `toml` 1 and `serde_spanned` NEW to the tree (both `toml-rs`
# project, MIT OR Apache-2.0, already on the deny.toml license allow-list — no
# new SPDX id); its parser deps `toml_parser` / `toml_datetime` / `winnow` and
# `serde_core` are ALREADY resolved (via `toml_edit` ← `proc-macro-crate`), so
# they add no new crate version. No CLI-parsing crate is pulled — a single
# `--config` / scalar-override flag set is parsed by a small hand-rolled parser
# in `src/config.rs`, so `clap` (a dev-only transitive of `criterion`) is NOT
# promoted to a runtime dependency. `cargo audit` / `cargo deny` (#019) gate it.
toml = { version = "1", default-features = false, features = ["parse", "serde"] }
# JSON parsing for the WebSocket client-action frames (#014). A `/ws` text frame
# is not an HTTP body, so the `axum::Json` extractor cannot reach it — the WS
# handler parses the frame itself (`serde_json::from_str`) to detect and reject
# order-entry-shaped frames and to decode the `{ "action": … }` protocol. Audit
# note: `serde_json` 1 is ALREADY resolved in the tree — `axum`'s `json` feature
# depends on it and it is a dev-dependency — so promoting it to a direct
# dependency adds NO new crate version; `cargo audit` / `cargo deny` (#019) gate
# it. MIT/Apache-2.0, maintained by the serde project.
serde_json = "1"
thiserror = "2"
# Structured logging for the actor lifecycle and its degraded paths — the venue
# logs through `tracing` exclusively (never `println!` / `log`), per CLAUDE.md
# and `rules/global_rules.md`. #006 is the first issue to emit events (actor
# stopped, a dropped write on a reused/sealed sequence, a sequencer write that
# cannot proceed). Version `0.1` is already resolved transitively via the
# upstream stack, so this direct dependency adds NO new version to the tree.
# MIT, maintained by the tokio project.
tracing = "0.1"
# The `tracing` subscriber the binary installs at startup (#013): without a
# subscriber every `tracing` event is silently dropped, so the server must
# install one before it logs. `default-features = false` + `["fmt","env-filter"]`
# gives exactly a formatting subscriber filtered by `RUST_LOG` — no ANSI/JSON
# extras pulled unless asked. It is the standard tokio-project subscriber (the
# canonical pair for `tracing`); it enters the tree at the binary only. `fmt`
# depends only on `tracing-core`; `env-filter` adds `regex`/`matchers`
# (already resolved via the dev/`proptest` tree). MIT, maintained by the tokio
# project; `cargo audit` / `cargo deny` (#019) gate it.
tracing-subscriber = { version = "0.3", default-features = false, features = [
    "fmt",
    "env-filter",
] }
# OpenAPI schema derivation: `ToSchema` on every REST/WS DTO and on the shared
# error envelopes, so #013 can register them in the OpenAPI document. Version 5
# (`5.5.0`) is already resolved transitively via the upstream stack, so this
# direct dependency adds NO new version to the tree. Default features only (no
# framework integration); the Swagger UI / `utoipa-axum` wiring lands with the
# REST gateway (#013). MIT/Apache-2.0, maintained by the utoipa project.
utoipa = "5"
# JWT (RS256, x509 key pair) for REST/WS auth (#011): `mint_token` / `verify_token`
# on the `JwtAuth` service. `default-features = false, features = ["use_pem"]`
# keeps exactly the PEM path we need (the `pem` + `simple_asn1` decoder) and no
# more; crucially, `DecodingKey::from_rsa_pem` extracts the RSA public key
# straight from a `CERTIFICATE` PEM, so `from_paths(cert, key)` needs NO separate
# x509 parser. The crypto backend is `ring` 0.17.14, which this dependency adds
# NEW to the tree (it was not present before #011) along with its transitive
# closure (`untrusted`, platform `windows_*` crates) — a native/asm RSA
# implementation entering the trusted computing base; `ring` is the reputable,
# widely audited crate `rustls` also uses, and `cargo audit`/`cargo deny` (#019)
# gate it. RS256 verification pins the algorithm to `[RS256]` (rejects `alg:none`
# and HS256 confusion before any crypto runs). MIT, maintained by the
# Keats/jsonwebtoken project (widely used, actively maintained).
jsonwebtoken = { version = "9", default-features = false, features = ["use_pem"] }
# Argon2id password hashing for the venue account registry (#012): the FIX
# shared-secret is stored only as an Argon2id PHC string at the pinned OWASP
# baseline (m = 19456 KiB, t = 2, p = 1) with an optional server-side pepper, and
# verified in constant time. Default features (`alloc` + `password-hash` + `rand`)
# are exactly what the registry needs — `password-hash` for the PHC parse/format
# and `PasswordHasher`/`PasswordVerifier` traits, `rand` (→ `password-hash/rand_core`)
# for `SaltString::generate`. `argon2` 0.5.3 is a pure-Rust RustCrypto crate (NO
# `ring`/C), adding `argon2` + `blake2` + `base64ct` + `password-hash` NEW to the
# tree (all RustCrypto, MIT/Apache-2.0, widely used); `cargo audit` / `cargo deny`
# (#019) gate them. The pinned parameters ARE `argon2`'s own documented defaults,
# so `Params::DEFAULT` equals the OWASP baseline. Argon2**id** is selected
# explicitly (never Argon2i/Argon2d).
argon2 = "0.5"
# The OS CSPRNG (`rand_core::OsRng`) that seeds each Argon2 salt via
# `SaltString::generate` (#012). `rand_core` 0.6.4 is ALREADY resolved in the tree
# (via `rand` 0.8 ← `optionstratlib`), so this direct dependency adds NO new crate
# version (verified: the Cargo.lock diff introduces only argon2/blake2/base64ct/
# password-hash); feature unification already has `getrandom` active at HEAD, so
# this just names `rand_core` directly for `OsRng`. `default-features = false` keeps it
# minimal. It is the SAME `rand_core` `password-hash` uses, so `OsRng` satisfies
# the `CryptoRngCore` bound. MIT/Apache-2.0, maintained by the rust-random project.
rand_core = { version = "0.6", default-features = false, features = ["getrandom"] }

[dev-dependencies]
proptest = "1"
serde_json = "1"
# Multi-threaded runtime for the actor's concurrent-submit ordering test
# (`#[tokio::test(flavor = "multi_thread")]`); additive to the `[dependencies]`
# tokio features above.
tokio = { version = "1", default-features = false, features = ["rt-multi-thread"] }
# `ServiceExt::oneshot` to drive the `auth_middleware` through a real `axum::Router`
# in `tests/auth.rs` (request flow → 401/403/429 + `X-RateLimit-*` headers) without
# binding a TCP listener. `tower` 0.5.3 is ALREADY in the tree (axum depends on
# it), so this dev-only dependency adds no new version; the `util` feature exposes
# `oneshot`. MIT, maintained by the tower project.
tower = { version = "0.5", features = ["util"] }
# The `bench-hdr` harness's DISTRIBUTION reporter (#020): every hot-path bench
# under `benches/` records latencies into a `Histogram<u64>` and reports
# p50/p99/p99.9/p99.99 through it — never criterion's default mean/std
# (docs/07-performance-budgets.md §5). `default-features = false`: the base
# `Histogram` type (`record` / `value_at_quantile` / `len` / `min` / `max`) only
# needs the crate's mandatory `num-traits` + `byteorder` deps (verified against
# the upstream `Cargo.toml`: `serialization` gates `flate2`/`nom`/`base64` for
# `.hgrm` file persistence and `sync` gates `crossbeam-channel` for
# `SyncHistogram` — both are the crate's own `default` set, and this harness
# uses neither: no histogram is persisted to disk, and every histogram here is
# owned by a single task/thread at a time). Dev-only: never reaches the shipped
# binary; `cargo audit` / `cargo deny` (#019) gate it like every other
# dependency. MIT/Apache-2.0, maintained by the HdrHistogram project (a direct
# Rust port of the reference Java/C# `HdrHistogram`, widely used for tail-latency
# reporting across the industry).
hdrhistogram = { version = "7", default-features = false }
# The `bench-hdr` harness's ORCHESTRATION half (#020,
# docs/07-performance-budgets.md §5: "criterion for orchestration, hdrhistogram
# for the reported distribution"). `benches/criterion_match_cost.rs` is a real,
# working `criterion`-driven micro-benchmark (deterministic workload
# construction, CPU-bound and independent of the actor/tokio machinery the
# hdrhistogram-native benches measure); the `hp1_order_path` / `hp2_ws_fanout` /
# `alloc_profile` binaries are deliberately `harness = false` plain binaries
# instead — per-sample `hdrhistogram` capture at scale does not fit criterion's
# default statistical-convergence iteration model (the same resolution the
# `orderbook-rs` sibling `bench-hdr` skill reached: its `_hdr` benches bypass
# criterion's `Bencher` entirely, while its OTHER benches keep using criterion
# natively) — so criterion's own mean/std-dev output, wherever it appears, is
# never cited as `BENCH.md` evidence. `default-features = false`: the crate's
# own `default` set (`rayon` + `plotters` + `cargo_bench_support`) pulls a
# thread-pool and an SVG plotting backend this harness's single benchmark
# function does not use; only `Criterion`/`criterion_group!`/`criterion_main!`
# and `Bencher::iter` are called. Dev-only: never reaches the shipped binary.
# MIT/Apache-2.0, maintained by the bheisler/criterion project.
criterion = { version = "0.8", default-features = false }
# `benches/alloc_profile.rs`'s global-allocator instrumentation (#020,
# self-review finding #112 on #75: the bench's original hand-rolled
# `CountingAllocator` carried a local `unsafe impl GlobalAlloc`, violating the
# repo's absolute no-`unsafe`-anywhere rule — an inline `// SAFETY:` comment is
# not a governance decision, per CLAUDE.md / rules/global_rules.md / ADR-0008).
# `stats_alloc::StatsAlloc<System>` is a drop-in `GlobalAlloc` wrapper whose
# `unsafe impl GlobalAlloc` is VENDORED inside the crate; `fauxchange`'s own
# code only ever calls the crate's fully safe API (`StatsAlloc::system()` —
# a stable, non-nightly-gated `const fn` — and `Region::new`/`Region::change`),
# so this bench needs zero `unsafe` of its own. `src/lib.rs` keeps
# `#![forbid(unsafe_code)]` unconditionally; this is a dev-dependency of a
# separate, independent bench binary — it never reaches the shipped crate or
# the container image. Audit note: `stats_alloc` 0.1.10 is a small (~200
# line), single-file, dependency-free (zero transitive deps — verified via the
# `Cargo.lock` diff: only `stats_alloc` itself is added) MIT-licensed crate by
# neoeinstein (github.com/neoeinstein/stats_alloc); `cargo audit` / `cargo
# deny` (#019) gate it like every other dependency and are clean. Reporting
# format: `Stats { allocations, deallocations, reallocations, bytes_allocated,
# bytes_deallocated, bytes_reallocated }` — a finer breakdown than the old
# hand-rolled counter (which folded `realloc` into the "alloc" bucket
# unconditionally and always added the FULL new size to `bytes_alloc`, even
# when a realloc shrank the allocation); the swap is a strictly more accurate
# accounting, so the recorded `allocs/op` / `bytes_alloc/op` numbers in
# `BENCH.md` §5 were re-measured (not carried over) — see that section's note.
stats_alloc = { version = "0.1.10", default-features = false }

[[bench]]
name = "hp1_order_path"
path = "benches/hp1_order_path.rs"
harness = false

[[bench]]
name = "hp2_ws_fanout"
path = "benches/hp2_ws_fanout.rs"
harness = false

[[bench]]
name = "alloc_profile"
path = "benches/alloc_profile.rs"
harness = false

[[bench]]
name = "criterion_match_cost"
path = "benches/criterion_match_cost.rs"
harness = false
